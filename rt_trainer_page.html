<!DOCTYPE html>
<html>
    <head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBKHJQ8986"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-DBKHJQ8986');
        </script>

        <!--Page meta information-->
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title class="title">Reaction Time Trainer</title>
        <link rel="stylesheet" href="rt_trainer_page.css"></link>
    </head>
    <body id="rt_trainer_page">
        <a href="main_page.html">
            <button id="exit_to_main_page_button">Exit</button>
        </a>

        <div class="settings_container">
            <!--Waiting Screen-->
            <div class="waiting_screen_container">
                <label for="waiting_screen_color_picker">Waiting Color: </label>
                <input type="color" id="waiting_screen_color_picker" value="#FF0000">
            </div>

            <!--Clicking Screen-->
            <div class="accepted_screen_container">
                <label for="accepted_screen_color_picker">Clicking Color: </label>
                <input type="color" id="accepted_screen_color_picker" value="#1AFF1A">
            </div>

            <!--Result Screen-->
            <div class="result_screen_container">
                <label for="result_screen_color_picker">Result / Misclick Screen: </label>
                <input type="color" id="result_screen_color_picker" value="#0096FF">
            </div>

            <label for="rt_threshold_input" id="rt_threshold_label">Enter RT threshold:</label>
            <input type="number" id="rt_threshold_input" value="" placeholder="ms">
            <button id="start_game_button">Start Game</button>
        </div>

        <div class="results_container">
            <p id="results_output"></p>
        </div>

        <div class="misclick_container">
            <p id="misclick_output"></p>
        </div>

        <script type="module" src="rt_trainer_page.js"></script>
    </body>
</html>

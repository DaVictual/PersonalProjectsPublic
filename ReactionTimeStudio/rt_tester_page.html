<!DOCTYPE html>
<html>
    <head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBKHJQ8986"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-DBKHJQ8986');
        </script>

        <!--Page meta information-->
        <meta name="viewport" content="width=device-width, initial-scale=1">
    
        <title class="title">Reaction Time Tester</title>
        <link rel="stylesheet" href="rt_tester_page.css"></link>
    </head>
    <body id="rt_tester_page">
        <!--Exit to main page-->
        <a href="main_page.html">
            <button id="exit_to_main_page_button">Exit</button>
        </a>

        <div id="start_screen_container">
            <!--Waiting Screen-->
            <div class="waiting_screen_container">
                <label for="waiting_screen_color_picker">Waiting Color: </label>
                <input type="color" id="waiting_screen_color_picker" value="#FF0000">
            </div>

            <!--Delay Inputs-->
            <div class="min_max_delay_container">
                <label for="min_delay_input">Min delay in seconds: </label>
                <input type="number" id="min_delay_input" value="2" min="0.1" max="10" step="0.1"><br><br>
                <label for="max_delay_input">Max delay in seconds: </label>
                <input type="number"id="max_delay_input" value="4" min="0.5" max="20" step="0.1">
            </div>

            <!--Clicking Screen-->
            <div class="accepted_screen_container">
                <label for="accepted_screen_color_picker">Clicking Color: </label>
                <input type="color" id="accepted_screen_color_picker" value="#1AFF1A">
            </div>

            <!--Result Screen-->
            <div class="result_screen_container">
                <label for="result_screen_color_picker">Result / Misclick Screen: </label>
                <input type="color" id="result_screen_color_picker" value="#0096FF">
            </div>

            <!--Biological Info-->
            <div class="user_biological_info_container">
                <div class="user_age_container">
                    <label for="user_age_input">Enter age: </label>
                    <input type="number" id="user_age_input" placeholder="(optional)" min="0" step="1">
                </div>
                <div id="user_refresh_rate_container">
                    <label for="user_refresh_rate_input">Enter monitor refresh rate (Hz): </label>
                    <input type="number" id="user_refresh_rate_input" placeholder="(optional)" min="1" step="1">
                </div>
                <div id="reaction_time_tester_page_start_screen_user_monitor_response_time">
                    <label for="user_monitor_response_time_input">Enter monitor response time (ms): </label>
                    <input type="number" id="user_monitor_response_time_input" placeholder="(optional)" min="0" step="0.1">
                </div>
            </div>

            <button id="reaction_time_tester_page_start_screen_start_game_button">Start Game</button>
        </div>

        <!--Result output-->
        <div id="reaction_time_tester_page_game_screen">
            <p id="reaction_time_tester_page_output"></p>
        </div>

        <!--Compiled .js-->
        <script type="module" src="rt_tester_page.js"></script>
    </body>
</html>
